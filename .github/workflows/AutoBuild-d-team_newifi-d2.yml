###########################################################
#   Description: Compile OpenWrt by GitHub Actions        #
#   Based on: https://github.com/P3TERX/Actions-OpenWrt   #
#   Optimized for Newifi D2 (流程优化，不动任何包)        #
###########################################################

name: NEWIFI D2

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      Tempoary_CONFIG:
        description: '配置文件'
        default: 'd-team_newifi-d2'
        type: choice
        options:
          - 'd-team_newifi-d2'
          - 'd-team_newifi-d2-Clash'
          - 'd-team_newifi-d2-Lite'
      Tempoary_FLAG:
        description: '固件标签'
        default: 'AUTO'
        type: choice
        options:
          - 'AUTO'
          - 'Full'
          - 'Clash'
          - 'Lite'
      Tempoary_IP:
        description: '固件 IP 地址 [可选]'
        default: ''
      UPLOAD_RELEASES:
        description: '上传固件到 Releases'
        default: 'true'
        type: boolean
      UPLOAD_ARTIFACTS:
        description: '上传固件到 Artifacts'
        default: 'false'
        type: boolean
      UPLOAD_BIN_ARTIFACTS:
        description: '上传 bin 文件夹到 Artifacts'
        default: 'false'
        type: boolean

env:
  CONFIG_FILE: d-team_newifi-d2
  DEFAULT_SOURCE: coolsnowwolf/lede:master
  DELETE_USELESS_FILES: true
  DELETE_OLD_WORKFLOW: false
  CACHE_ACCELERATE: false

jobs:
  Compile:
    runs-on: ubuntu-22.04
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:

    - name: Checkout
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Load Custom Variables
      run: |
        if [ -n "${{ github.event.inputs.Tempoary_CONFIG }}" ]; then
            if [ -f "$GITHUB_WORKSPACE/Configs/${{ github.event.inputs.Tempoary_CONFIG }}" ]; then
                CONFIG_FILE=${{ github.event.inputs.Tempoary_CONFIG }}
            else
                CONFIG_FILE=${{ env.CONFIG_FILE }}
            fi
        else
            CONFIG_FILE=${{ env.CONFIG_FILE }}
        fi
        if [ ! -f "$GITHUB_WORKSPACE/Configs/$CONFIG_FILE" ]; then
            echo "CONFIG_FILE: [/Config/$CONFIG_FILE] is not detected ..."
            exit 1
        fi
        echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
        if [ -n "${{ github.event.inputs.Tempoary_IP }}" ]; then
            echo "Tempoary_IP=${{ github.event.inputs.Tempoary_IP }}" >> $GITHUB_ENV
        fi
        if [ -n "${{ github.event.inputs.Tempoary_FLAG }}" ]; then
            echo "Tempoary_FLAG=${{ github.event.inputs.Tempoary_FLAG }}" >> $GITHUB_ENV
        fi
        REPO_URL="https://github.com/$(cut -d \: -f 1 <<< ${{ env.DEFAULT_SOURCE }})"
        REPO_BRANCH=$(cut -d \: -f 2 <<< ${{ env.DEFAULT_SOURCE }})
        echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_ENV
        echo "Compile_Date=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        echo "Display_Date=$(date +%Y/%m/%d)" >> $GITHUB_ENV
        if [[ -z "${{ github.event.inputs.Tempoary_CONFIG }}" ]]; then
            echo "TIMED_TRIGGER=true" >> $GITHUB_ENV
        else
            echo "UPLOAD_RELEASES=${{ github.event.inputs.UPLOAD_RELEASES }}" >> $GITHUB_ENV
            echo "UPLOAD_ARTIFACTS=${{ github.event.inputs.UPLOAD_ARTIFACTS }}" >> $GITHUB_ENV
            echo "UPLOAD_BIN_ARTIFACTS=${{ github.event.inputs.UPLOAD_BIN_ARTIFACTS }}" >> $GITHUB_ENV
        fi

    - name: TIMED_TRIGGER
      if: env.TIMED_TRIGGER == 'true'
      env:
        UPLOAD_RELEASES: true
        UPLOAD_ARTIFACTS: false
        UPLOAD_BIN_ARTIFACTS: false
      run: |
        echo "UPLOAD_RELEASES=${UPLOAD_RELEASES}" >> $GITHUB_ENV
        echo "UPLOAD_ARTIFACTS=${UPLOAD_ARTIFACTS}" >> $GITHUB_ENV
        echo "UPLOAD_BIN_ARTIFACTS=${UPLOAD_BIN_ARTIFACTS}" >> $GITHUB_ENV

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        sudo -E apt update
        sudo -E apt -y full-upgrade
        sudo -E apt-get -y install busybox build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib g++-multilib p7zip p7zip-full msmtp libssl-dev texinfo libreadline-dev libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint ccache curl wget vim nano python3 python3-pip python3-ply haveged lrzsz device-tree-compiler scons antlr3 gperf intltool mkisofs rsync python3-distutils python3-setuptools libtirpc-dev rpcbind
        sudo -E apt -y autoremove --purge
        sudo -E apt clean
        sudo timedatectl set-timezone "Asia/Shanghai"

        # 安装新版 CMake 3.31.5
        echo "Installing CMake 3.31.5..."
        sudo apt-get remove -y cmake 2>/dev/null || true
        sudo apt-get autoremove -y cmake 2>/dev/null || true
        sudo rm -f /usr/bin/cmake /usr/local/bin/cmake /bin/cmake
        sudo rm -rf /usr/share/cmake-* /usr/local/share/cmake-*
        wget -qO- "https://github.com/Kitware/CMake/releases/download/v3.31.5/cmake-3.31.5-linux-x86_64.tar.gz" | sudo tar --strip-components=1 -xz -C /usr
        hash -r
        export PATH=/usr/bin:$PATH
        echo "/usr/bin" >> $GITHUB_PATH
        echo "CMake version: $(cmake --version)"
        echo "CMAKE=/usr/bin/cmake" >> $GITHUB_ENV
        echo "cmake_BIN=/usr/bin/cmake" >> $GITHUB_ENV

    - name: Clone Openwrt Source Code
      run: |
        git clone -b $REPO_BRANCH $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Accelerate
      if: env.CACHE_ACCELERATE == 'true'
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: false
        toolchain: true
        skip: true
        clean: true
        prefix: ${{ github.workspace }}/openwrt

    - name: Load Config and Make defconfig
      run: |
        cd openwrt
        export PATH=/usr/bin:$PATH
        export CMAKE=/usr/bin/cmake
        export cmake_BIN=/usr/bin/cmake
        if [ -f "rules.mk" ]; then
          sed -i 's|CMAKE:=cmake|CMAKE:=/usr/bin/cmake|g' rules.mk
        fi
        cp $GITHUB_WORKSPACE/Configs/$CONFIG_FILE .config
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_DiyScript.sh
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_Function.sh
        Firmware_Diy_Start
        Firmware_Diy_Main
        Firmware_Diy
        Firmware_Diy_Other

        # ====== 1. 锁死 SSL 库（暴力去冲突） ======
        sed -i '/CONFIG_PACKAGE_libustream-mbedtls/d' .config
        sed -i '/CONFIG_PACKAGE_libustream-openssl/d' .config
        echo "CONFIG_PACKAGE_libustream-openssl=y" >> .config
        echo "# CONFIG_PACKAGE_libustream-mbedtls is not set" >> .config
        echo "SSL library locked to openssl."

        # ====== 2. 创建假包（满足缺失依赖） ======
        echo "Creating dummy packages..."
        mkdir -p package/dummy/ucode-mod-log
        cat > package/dummy/ucode-mod-log/Makefile <<'EOF'
        include $(TOPDIR)/rules.mk
        PKG_NAME:=ucode-mod-log
        PKG_VERSION:=1.0
        PKG_RELEASE:=1
        include $(INCLUDE_DIR)/package.mk
        define Package/ucode-mod-log
          SECTION:=dummy
          CATEGORY:=Dummy
          TITLE:=Dummy package for ucode-mod-log
        endef
        define Package/ucode-mod-log/install
          true
        endef
        define Build/Compile
          true
        endef
        $(eval $(call BuildPackage,ucode-mod-log))
        EOF

        mkdir -p package/dummy/rpcd-mod-rrdns
        cat > package/dummy/rpcd-mod-rrdns/Makefile <<'EOF'
        include $(TOPDIR)/rules.mk
        PKG_NAME:=rpcd-mod-rrdns
        PKG_VERSION:=1.0
        PKG_RELEASE:=1
        include $(INCLUDE_DIR)/package.mk
        define Package/rpcd-mod-rrdns
          SECTION:=dummy
          CATEGORY:=Dummy
          TITLE:=Dummy package for rpcd-mod-rrdns
        endef
        define Package/rpcd-mod-rrdns/install
          true
        endef
        define Build/Compile
          true
        endef
        $(eval $(call BuildPackage,rpcd-mod-rrdns))
        EOF
        echo "Dummy packages created."

        # ====== 3. 最终整合配置 ======
        if [ "${{ env.CACHE_ACCELERATE }}" == true ]; then
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
        fi
        # ====== 替换 luci-ssl 为 luci-ssl-openssl (避免依赖冲突) ======
        sed -i 's/CONFIG_PACKAGE_luci-ssl=y/# CONFIG_PACKAGE_luci-ssl is not set/' .config
        echo "CONFIG_PACKAGE_luci-ssl-openssl=y" >> .config
        echo "Replaced luci-ssl with luci-ssl-openssl."
        make defconfig

    - name: Pre-download Libraries
      run: |
        cd openwrt
        export PATH=/usr/bin:$PATH
        export CMAKE=/usr/bin/cmake
        make defconfig
        DOWNLOAD_JOBS=$(nproc)
        echo "Downloading sources with ${DOWNLOAD_JOBS} threads..."
        for i in 1 2 3 4 5; do
          echo "Attempt $i..."
          make download -j${DOWNLOAD_JOBS} && break
          echo "Download failed, retrying in 10s..."
          sleep 10
        done
        find dl -size 0 -type f -exec rm -f {} \;
        echo "Download completed!"

    - name: Build OpenWrt
      id: compile
      run: |
        cd openwrt
        export PATH=/usr/bin:$PATH
        export CMAKE=/usr/bin/cmake
        export cmake_BIN=/usr/bin/cmake

        echo "Available disk space before build:"
        df -h .
        rm -rf tmp
        rm -rf build_dir/target-*/linux-*/linux-* 2>/dev/null || true

        echo "Using CMake: $(which cmake)"
        cmake --version
        echo "Fixing CMake minimum version requirements..."
        find . -type f -name "CMakeLists.txt" -exec sed -i 's/cmake_minimum_required(VERSION 3\.3[0-9])/cmake_minimum_required(VERSION 3.5)/g' {} \; 2>/dev/null || true
        find . -type f -name "CMakeLists.txt" -exec sed -i 's/cmake_minimum_required(VERSION 2\.8\.12)/cmake_minimum_required(VERSION 3.5)/g' {} \; 2>/dev/null || true

        # ====== 编译前最终锁定配置 ======
        echo "Final locking of configuration..."

        # 1. 锁死 SSL 库（再次确保不冲突）
        sed -i '/CONFIG_PACKAGE_libustream-mbedtls/d' .config
        sed -i '/CONFIG_PACKAGE_libustream-openssl/d' .config
        echo "CONFIG_PACKAGE_libustream-openssl=y" >> .config
        echo "# CONFIG_PACKAGE_libustream-mbedtls is not set" >> .config

        # 2. 启用假包（满足缺失依赖）
        echo "CONFIG_PACKAGE_ucode-mod-log=y" >> .config
        echo "CONFIG_PACKAGE_rpcd-mod-rrdns=y" >> .config

        echo "Configuration locked. Starting compilation..."
        # ====================================

        echo "Starting compilation (multi-threaded)..."
        make -j4 2>&1 | tee build.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "Multi-threaded build failed. Retrying with single-thread verbose mode..."
          make -j1 V=s 2>&1 | tee -a build.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "Compile_Result=true" >> $GITHUB_ENV
          else
            echo "Compile_Result=false" >> $GITHUB_ENV
          fi
        else
          echo "Compile_Result=true" >> $GITHUB_ENV
        fi

        if command -v ccache &> /dev/null; then
          ccache -s >> build.log
        fi
        
    - name: Upload build log and error summary
      if: always() && steps.compile.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-build-log-${{ env.Compile_Date }}
        path: |
          openwrt/build.log

    - name: Checkout Firmware
      if: steps.compile.outcome == 'success' && !cancelled()
      run: |
        cd openwrt
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_Function.sh
        Firmware_Diy_End
        # 输出固件清单到 Step Summary
        echo "=== Firmware Files ===" >> $GITHUB_STEP_SUMMARY
        find bin/targets -type f \( -name "*.bin" -o -name "*.img.gz" -o -name "*.tar.gz" \) -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY

    - name: Upload Firmware to Artifacts
      uses: actions/upload-artifact@main
      if: env.UPLOAD_ARTIFACTS == 'true' && steps.compile.outcome == 'success' && !cancelled()
      with:
        name: ${{ env.CONFIG_FILE }}_firmware_${{ env.Compile_Date }}
        path: openwrt/bin/Firmware

    - name: Upload bin to Artifacts
      uses: actions/upload-artifact@main
      if: env.UPLOAD_BIN_ARTIFACTS == 'true' && steps.compile.outcome == 'success' && !cancelled()
      with:
        name: ${{ env.CONFIG_FILE }}_bin_${{ env.Compile_Date }}
        path: openwrt/bin

    - name: Upload Firmware to Release
      uses: svenstaro/upload-release-action@v2
      if: env.UPLOAD_RELEASES == 'true' && steps.compile.outcome == 'success' && !cancelled()
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: openwrt/bin/Firmware/*
        file_glob: true
        tag: AutoUpdate
        overwrite: true

    - name: Refresh API (1/2)
      if: env.UPLOAD_RELEASES == 'true' && steps.compile.outcome == 'success' && !cancelled()
      run: |
        wget https://api.github.com/repos/${{github.repository}}/releases/tags/AutoUpdate -O API

    - name: Refresh API (2/2)
      if: env.UPLOAD_RELEASES == 'true' && steps.compile.outcome == 'success' && !cancelled()
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./API
        file_glob: true
        tag: AutoUpdate
        overwrite: true

    - name: Delete old Workflow Runs
      continue-on-error: true
      if: env.DELETE_OLD_WORKFLOW == 'true' && !cancelled()
      uses: Mattraks/delete-workflow-runs@v2
      with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 0
